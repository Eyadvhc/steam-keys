<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Keys</title>

    <style>
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 40px;
        }

        /* GRID LAYOUT */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #000;
        }

        .download-btn {
            background: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .download-btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <h1>Steam Keys</h1>

    <div class="grid-container">

        <div class="game-card">
            <h2>Call of Duty: Black Ops 3</h2>
            <a href="call of duty black ops 3.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Cyberpunk 2077</h2>
            <a href="cyperpunk 2077.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>God of War Ragnarök</h2>
            <a href="God of War Ragnarök.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Marvel's Spider-Man: Miles Morales</h2>
            <a href="Marvel's Spider Man Miles Morales.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Marvel's Spider-Man 2</h2>
            <a href="Marvel's Spider-Man 2.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <!-- NEW GAMES ADDED BELOW -->

        <div class="game-card">
            <h2>Call of Duty: Black Ops II</h2>
            <a href="Call of Duty Black Ops II.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Red Dead Redemption</h2>
            <a href="Red Dead Redemption.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Split Fiction</h2>
            <a href="Split Fiction.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Stronghold Crusader: Definitive Edition</h2>
            <a href="Stronghold Crusader Definitive Edition.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

        <div class="game-card">
            <h2>Grand Theft Auto V Legacy</h2>
            <a href="Grand Theft Auto V Legacy.zip" download>
                <button class="download-btn">Download</button>
            </a>
        </div>

    </div>

</body>
</html>
